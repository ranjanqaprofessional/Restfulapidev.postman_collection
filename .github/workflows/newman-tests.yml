name: Newman API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3: Install Newman + htmlextra reporter
      - name: Install Newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      # Step 4: Run your collection
      - name: Run API tests
        run: |
          newman run Restfulapidev.postman_collection.json \
            -r cli,htmlextra \
            --reporter-htmlextra-export newman-report.html

      # Step 5: Upload the HTML report
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.html